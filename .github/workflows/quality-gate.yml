name: Quality Gate

# Blocking, deterministic quality gates for ordinary pushes/PRs. Scoped to
# local checks only — provider/model drift and maintenance lanes (npm run gates)
# stay out of CI to keep this deterministic and free of external state.
on:
  pull_request:
  push:
    branches:
      - master

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Obsidian lint (enforced ratchet)
        run: npm run lint:obsidian

      - name: TypeScript no-emit
        run: npx tsc --noEmit

      - name: Production build (no backup/vault copy)
        run: npm run build-only

      - name: Unit tests
        run: npm run test:quiet
